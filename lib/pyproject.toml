[project]
name = "pymcu-stdlib"
version = "0.1.0-alpha-1"
description = "Standard Library for pymcu compiler"
authors = [
    {name = "Iván Montiel Cardona",email = "developer@begeistert.dev"}
]
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
]

[tool.poetry]
packages = [{include = "pymcu", from = "src"}]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
