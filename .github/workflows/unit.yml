name: Unit Tests

on:
  push:
    branches: [ "main", "develop", "feature/**", "dotnet" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unit:
    runs-on: ubuntu-latest
    name: Unit Tests (.NET)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore packages
        run: dotnet restore tests/unit/PyMCU.Tests.csproj --nologo

      - name: Run unit tests
        run: |
          dotnet test tests/unit/PyMCU.Tests.csproj \
            --no-restore \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --nologo
