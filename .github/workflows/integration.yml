name: Integration Tests

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  integration:
    runs-on: ubuntu-latest
    name: Integration Tests (AVR)
    container:
      image: ${{ vars.DOCKER_REGISTRY_URL }}/${{ github.repository }}:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Whipsnake CLI
        run: uv sync

      - name: Override whipsnake-stdlib with local source
        run: uv pip install lib/

      - name: Install compat stdlib flavors
        run: |
          uv pip install external/whipsnake-micropython/
          uv pip install external/whipsnake-circuitpython/

      # - name: Install build tools
      #   run: sudo apt-get install -y build-essential flex bison ninja-build cmake

      - name: Build AVRA assembler from source
        run: |
          git clone --depth 1 https://github.com/Ro5bert/avra.git /tmp/avra
          make -C /tmp/avra
          mkdir -p "$HOME/.whipsnake/tools/linux/avra/avra-1.3.0/src"
          cp /tmp/avra/src/avra "$HOME/.whipsnake/tools/linux/avra/avra-1.3.0/src/avra"

      - name: Build whipc compiler
        run: cmake -B build -G Ninja && cmake --build build

      - name: Add whipc to PATH
        run: echo "$GITHUB_WORKSPACE/build/bin" >> $GITHUB_PATH

      - name: Add private NuGet source
        if: ${{ secrets.NUGET_PRIVATE_SOURCE_URL != '' }}
        run: |
          dotnet nuget add source "${{ secrets.NUGET_PRIVATE_SOURCE_URL }}" \
            --name private \
            --username ci \
            --password "${{ secrets.NUGET_PRIVATE_API_KEY }}" \
            --store-password-in-clear-text

      - name: Restore integration test packages
        run: dotnet restore tests/integration/Whipsnake.IntegrationTests.csproj --nologo

      - name: Run integration tests
        run: |
          dotnet test tests/integration/Whipsnake.IntegrationTests.csproj \
            --no-restore \
            --logger "console;verbosity=normal" \
            --blame-hang-timeout 120s \
            -- NUnit.NumberOfTestWorkers=1
