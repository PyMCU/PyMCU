name: Integration Tests

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  integration:
    runs-on: ubuntu-latest
    name: Integration Tests (AVR)
    container:
      image: ${{ vars.DOCKER_REGISTRY_URL }}/${{ github.repository }}:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Optional: connect to private Headscale network ────────────────────────
      # Set HEADSCALE_URL (var) and HEADSCALE_AUTH_KEY (secret) to enable.
      # This gives CI access to resources on your private lab (NuGet feeds,
      # artifact registries, etc.) that are not reachable from the public internet.
      #
      # Note: Tailscale runs on the runner host, not inside the container.
      # To route container traffic through Tailscale, add "--network host" to
      # container.options above.
      - name: Connect to Headscale (optional)
        if: vars.HEADSCALE_URL != ''
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up \
            --authkey="${{ secrets.HEADSCALE_AUTH_KEY }}" \
            --login-server="${{ vars.HEADSCALE_URL }}" \
            --hostname="whipsnake-ci-${{ github.run_id }}" \
            --accept-routes

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Whipsnake CLI
        run: uv sync

      - name: Override whipsnake-stdlib with local source
        run: uv pip install lib/

      - name: Install compat stdlib flavors
        run: |
          uv pip install external/whipsnake-micropython/
          uv pip install external/whipsnake-circuitpython/

      # - name: Install build tools
      #   run: sudo apt-get install -y build-essential flex bison ninja-build cmake

      - name: Install AVR toolchain (avr-as + avr-ld + avr-objcopy + avr-gcc)
        run: sudo apt-get install -y --no-install-recommends binutils-avr gcc-avr

      - name: Build whipc compiler
        run: cmake -B build -G Ninja && cmake --build build

      - name: Add whipc to PATH
        run: echo "$GITHUB_WORKSPACE/build/bin" >> $GITHUB_PATH

      - name: Add private NuGet source
        if: ${{ secrets.NUGET_PRIVATE_SOURCE_URL != '' }}
        run: |
          dotnet nuget add source "${{ secrets.NUGET_PRIVATE_SOURCE_URL }}" \
            --name private \
            --username ci \
            --password "${{ secrets.NUGET_PRIVATE_API_KEY }}" \
            --store-password-in-clear-text

      - name: Restore integration test packages
        run: dotnet restore tests/integration/Whipsnake.IntegrationTests.csproj --nologo

      - name: Run integration tests
        run: |
          dotnet test tests/integration/Whipsnake.IntegrationTests.csproj \
            --no-restore \
            --logger "console;verbosity=normal" \
            --blame-hang-timeout 120s \
            -- NUnit.NumberOfTestWorkers=1
