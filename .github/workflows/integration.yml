name: Integration Tests

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  integration:
    runs-on: ubuntu-latest
    name: Integration Tests (AVR)
    container:
      image: ${{ vars.DOCKER_REGISTRY_URL }}/${{ github.repository }}:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install PyMCU CLI
        run: uv sync

      - name: Override pymcu-stdlib with local source
        run: uv pip install lib/

      - name: Install compat stdlib flavors
        run: |
          uv pip install external/pymcu-micropython/
          uv pip install external/pymcu-circuitpython/

      # - name: Install build tools
      #   run: sudo apt-get install -y build-essential flex bison ninja-build cmake

      - name: Install AVR toolchain (avr-as + avr-ld + avr-objcopy + avr-gcc)
        run: sudo apt-get install -y --no-install-recommends binutils-avr gcc-avr

      - name: Build pymcuc compiler
        run: |
          dotnet publish src/compiler/PyMCU.csproj \
            -c Release -o build/bin --nologo

      - name: Add pymcuc to PATH
        run: echo "$GITHUB_WORKSPACE/build/bin" >> $GITHUB_PATH

      - name: Restore integration test packages
        run: dotnet restore tests/integration/PyMCU.IntegrationTests.csproj --nologo

      - name: Run integration tests
        run: |
          dotnet test tests/integration/PyMCU.IntegrationTests.csproj \
            --no-restore \
            --logger "console;verbosity=normal" \
            --blame-hang-timeout 120s \
            -- NUnit.NumberOfTestWorkers=1
