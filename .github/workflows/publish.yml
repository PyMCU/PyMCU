name: Publish Wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Classifies the triggering ref: stable tag, pre-release tag, or no tag
  # (manual dispatch without a tag — wheels are built but nothing is published).
  check-tag:
    name: Detect release type
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      is_stable: ${{ steps.tag.outputs.is_stable }}
      is_prerelease: ${{ steps.tag.outputs.is_prerelease }}
    steps:
      - name: Classify tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true"     >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "is_stable=false"    >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false"    >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build-stdlib:
    name: Build pymcu-stdlib
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build stdlib wheel
        run: cd lib && uv build

      - name: Upload stdlib artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-stdlib
          path: lib/dist/*
          retention-days: 15

  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        with:
          package-dir: src/driver

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 15

  # Runs only on a stable tag: vX.Y.Z (digits and dots only after the v).
  publish-pypi:
    name: Publish to PyPI
    needs: [check-tag, build-stdlib, build-wheels]
    if: needs.check-tag.outputs.is_stable == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Publish to PyPI
        run: uv publish dist/*

  # Runs only on a pre-release tag (any v* tag that is not vX.Y.Z).
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [check-tag, build-stdlib, build-wheels]
    if: needs.check-tag.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    environment: prerelease
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/ dist/*