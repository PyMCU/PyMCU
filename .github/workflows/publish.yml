name: Publish Wheels

on:
  push:
    tags:
      - 'v*'

jobs:
  build_stdlib:
    name: Build pymcu-stdlib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build stdlib
        run: |
          cd lib
          uv build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-stdlib
          path: lib/dist/*

  build_wheels:
    name: Build wheels for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_WRAPPED_WHEEL_DIR: src/driver
        with:
          package-dir: src/driver

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish Package
    needs: [build_stdlib, build_wheels]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Publish Package
        env:
          TARGET_URL: ${{ secrets.PUBLISH_REGISTRY_URL }}
          TARGET_USER: ${{ secrets.PUBLISH_USER }}
          TARGET_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          if [ -n "$TARGET_URL" ]; then
            uv publish --publish-url "$TARGET_URL" --username "$TARGET_USER" --password "$TARGET_TOKEN" dist/*
          else
            if [ -z "$TARGET_TOKEN" ]; then
              # Attempt OIDC publish if no token is provided
              uv publish dist/*
            else
              uv publish --token "$TARGET_TOKEN" dist/*
            fi
          fi