name: CI

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  unit:
    name: Unit Tests (.NET)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore packages
        run: dotnet restore tests/unit/PyMCU.Tests.csproj --nologo

      - name: Run unit tests
        run: |
          dotnet test tests/unit/PyMCU.Tests.csproj \
            --no-restore \
            --logger "trx;LogFileName=unit-results.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory test-results \
            --nologo

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 15

  integration:
    name: Integration Tests (AVR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/pymcu/pymcu:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install PyMCU CLI
        run: uv sync

      - name: Override pymcu-stdlib with local source
        run: uv pip install lib/

      - name: Install compat stdlib flavors
        run: |
          uv pip install external/pymcu-micropython/
          uv pip install external/pymcu-circuitpython/

      - name: Build pymcuc compiler
        run: |
          dotnet publish src/compiler/PyMCU.csproj \
            -c Release -o build/bin --nologo

      - name: Add pymcuc to PATH
        run: echo "$GITHUB_WORKSPACE/build/bin" >> $GITHUB_PATH

      - name: Restore integration test packages
        run: dotnet restore tests/integration/PyMCU.IntegrationTests.csproj --nologo

      - name: Run integration tests
        run: |
          dotnet test tests/integration/PyMCU.IntegrationTests.csproj \
            --no-restore \
            --logger "trx;LogFileName=integration-results.trx" \
            --logger "console;verbosity=normal" \
            --blame-hang-timeout 120s \
            --results-directory test-results \
            --nologo \
            -- NUnit.NumberOfTestWorkers=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results/
          retention-days: 15
