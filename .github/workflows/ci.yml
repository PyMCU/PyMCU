name: CI

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  unit:
    name: Unit Tests (.NET)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Restore packages
        run: dotnet restore tests/unit/PyMCU.Tests.csproj --nologo

      - name: Run unit tests
        run: |
          dotnet test tests/unit/PyMCU.Tests.csproj \
            --no-restore \
            --logger "trx;LogFileName=unit-results.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory test-results \
            --nologo

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 15

  integration:
    name: Integration Tests (AVR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/pymcu/pymcu:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Create virtual environment and install dependencies
        run: |
          uv venv .venv
          uv pip install --python .venv -e .
          uv pip install --python .venv ./lib
          uv pip install --python .venv ./external/pymcu-micropython
          uv pip install --python .venv ./external/pymcu-circuitpython

      - name: Configure environment
        run: |
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> $GITHUB_ENV

      - name: Build pymcuc compiler
        run: |
          dotnet publish src/compiler/PyMCU.csproj \
            -c Release -o build/bin --nologo

      - name: Add pymcuc to PATH
        run: echo "$GITHUB_WORKSPACE/build/bin" >> $GITHUB_PATH

      - name: Restore integration test packages
        run: dotnet restore tests/integration/PyMCU.IntegrationTests.csproj --nologo

      - name: Run integration tests
        run: |
          dotnet test tests/integration/PyMCU.IntegrationTests.csproj \
            --no-restore \
            --logger "trx;LogFileName=integration-results.trx" \
            --logger "console;verbosity=normal" \
            --blame-hang-timeout 120s \
            --results-directory test-results \
            --nologo \
            -- NUnit.NumberOfTestWorkers=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-test-results
          path: test-results/
          retention-days: 15

  driver-tests:
    name: Driver Tests (Python)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install driver dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-mock tomlkit rich typer

      - name: Run driver tests
        run: pytest tests/driver/ -v --tb=short
