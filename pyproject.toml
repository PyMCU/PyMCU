[build-system]
requires = ["scikit-build-core>=0.10.0", "cmake>=4.1", "ninja"]
build-backend = "scikit_build_core.build"

[project]
name = "whipsnake"
version = "0.1.0a1"
description = "Python-to-MCU compiler driver"
readme = "README.md"
authors = [
    { name = "Iván Montiel Cardona", email = "developer@begeistert.dev" }
]
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12.0",
    "tomlkit>=0.12.0",
    "rich>=13.0.0",
    "whisnake-stdlib>=0.1.0a1"
]

[[tool.uv.index]]
name = "gitea"
url = "https://gitea.begeistert.dev/api/packages/begeistert/pypi/simple"
explicit = true

[tool.uv.sources]
whisnake-stdlib = {index = "gitea"}

[project.scripts]
whip = "driver.main:run_cli"

[tool.scikit-build]
cmake.source-dir = "."
wheel.packages = ["src/driver"]
wheel.install-dir = "driver"
cmake.build-type = "Release"

[tool.scikit-build.cmake.define]
SKBUILD = "ON"

[tool.scikit-build.sdist]
include = [
    "src",              # Incluye common, compiler y driver
    "CMakeLists.txt"
]

[tool.cibuildwheel]
build-frontend = "build"
# Optimization: skip some versions if needed
skip = "cp36-* cp37-* cp38-* cp39-* cp310-* pp*"

[tool.cibuildwheel.macos]
archs = ["x86_64", "arm64"]

[tool.cibuildwheel.windows]
archs = ["AMD64", "x86"]

